<!DOCTYPE html>
<html>
<head>
  <title>Flight Booking</title>
</head>
<body>

<h1>Flight List</h1>
<div id="flights"></div>

<h2>Add Flight</h2>
<input id="dep" placeholder="Departure Airport"><br>
<input id="arr" placeholder="Arrival Airport"><br>
<input id="time" placeholder="Departure Time"><br>
<input id="pilot" placeholder="Pilot"><br>
<input id="passengers" placeholder="Passengers"><br>
<button onclick="addFlight()">Add Flight</button>

<script>
const API_URL = "https://script.googleusercontent.com/a/macros/getairborne.com.au/echo?user_content_key=AWDtjMUNMz-DmEJmatYVPn-lrlH4V5L_nBECN5blh6himNrXUjblVWTJKMCKjNvMNcGuQ2jb8MjU7Loo13zXZ7HYElCe5l3OtEv1G8mbZB-7Q3Mmm4A4imdQ-oKZ0dVHKWVeaePp7mLPK27bQl4Ci4GO46K_Lx4Ud-BQTTeXFn0C7rfr5Hg2--L09buSxfAB2FeJW-T0AKxRyuo4sZ4fe0LciONs-zguaGKAYVYhuY-Gf3_NVSU1SpaGj5IXudEO3RCcFXS-8xCZ1X8VpDPuFr5eXW-3iIiG_ujeH64eNhrdvX9RNxV8O7tAdnVCNlDUPQ&lib=MEZJ3cTviUW156Szje3Hz1dMU3_7NEnu4";

async function loadFlights() {
  const res = await fetch(API_URL);
  const flights = await res.json();

  const container = document.getElementById("flights");
  container.innerHTML = "";

  flights.forEach(f => {
    const div = document.createElement("div");
    div.innerHTML = `
      <hr>
      <b>${f.DepartureAirport} → ${f.ArrivalAirport}</b><br>
      Time: ${f.DepartureTime}<br>
      Pilot: ${f.Pilot}<br>
      Passengers: ${f.Passengers}
    `;
    container.appendChild(div);
  });
}

async function addFlight() {
  const flight = {
    FlightID: Date.now(),
    DepartureAirport: document.getElementById("dep").value,
    ArrivalAirport: document.getElementById("arr").value,
    DepartureTime: document.getElementById("time").value,
    Pilot: document.getElementById("pilot").value,
    Passengers: document.getElementById("passengers").value
  };

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(flight)
  });

  loadFlights();
}

loadFlights();
</script>

</body>
</html>
